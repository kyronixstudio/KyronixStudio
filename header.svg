<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#160726"/>
      <stop offset="45%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>

  <circle cx="140" cy="40" r="90" fill="url(#glow)" filter="url(#soft)"/>
  <circle cx="1080" cy="170" r="120" fill="url(#glow)" filter="url(#soft)"/>

  <path d="M0,150 C220,110 380,190 600,150 C820,110 980,190 1200,150 L1200,200 L0,200 Z" fill="url(#wave1)"/>
  <path d="M0,170 C240,140 400,200 600,170 C800,140 960,200 1200,170 L1200,200 L0,200 Z" fill="#FFFFFF" fill-opacity="0.05"/>

  <text x="600" y="88" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="44" font-weight="700" fill="#FFFFFF" letter-spacing="1" opacity="0">
    KYRONIX HEADQUARTERS
    <animate attributeName="opacity" from="0" to="1" dur="1s" fill="freeze"/>
  </text>

  <text x="600" y="122" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="18" fill="#E9D5FF" opacity="0">
    We build websites, Discord bots &amp; SaaS
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.35s" fill="freeze"/>
  </text>
</svg>
